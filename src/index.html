<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Inspector Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Title Bar / Window Controls -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag" id="titlebar-drag">
      <span class="titlebar-text">Inspector Browser</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="5.5" width="8" height="1" fill="currentColor"/></svg>
      </button>
      <button class="titlebar-btn" id="btn-maximize" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="titlebar-btn titlebar-close" id="btn-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tab-bar">
    <div class="tab-container" id="tab-container">
      <!-- Tabs are dynamically added -->
    </div>
    <button class="new-tab-btn" id="new-tab-btn" title="New Tab">
      <svg width="16" height="16" viewBox="0 0 16 16"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2"/></svg>
    </button>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar" id="nav-bar">
    <div class="nav-controls">
      <button class="nav-btn" id="btn-back" title="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <button class="nav-btn" id="btn-forward" title="Forward">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
      </button>
      <button class="nav-btn" id="btn-reload" title="Reload">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="reload-icon"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>

    <div class="url-bar" id="url-bar">
      <div class="url-bar-icon" id="url-bar-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <div class="url-bar-security" id="url-bar-security" title="Connection secure">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      </div>
      <input type="text" class="url-input" id="url-input" placeholder="Enter URL or search..." autocomplete="off" spellcheck="false">
      <div class="url-bar-loading" id="url-bar-loading" style="display:none;">
        <div class="loading-spinner"></div>
      </div>
      <button class="url-bar-bookmark" id="url-bar-bookmark" title="Bookmark this page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="bookmark-icon"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
      </button>
    </div>

    <div class="nav-actions">
      <button class="nav-btn" id="btn-devtools" title="Toggle Developer Tools Panel">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
      </button>
      <button class="nav-btn nav-btn-active" id="btn-monitor" title="Toggle Monitor Panel">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
      </button>
    </div>
  </div>

  <!-- Bookmarks Bar -->
  <div class="bookmarks-bar" id="bookmarks-bar">
    <div class="bookmarks-container" id="bookmarks-container">
      <!-- Bookmarks are dynamically added -->
    </div>
    <button class="bookmarks-more-btn" id="bookmarks-more-btn" title="Manage bookmarks">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </button>
  </div>

  <!-- Bookmarks Manager Modal -->
  <div class="bookmarks-modal-overlay" id="bookmarks-modal-overlay" style="display:none">
    <div class="bookmarks-modal" id="bookmarks-modal">
      <div class="bookmarks-modal-header">
        <h3>Bookmarks Manager</h3>
        <button class="bookmarks-modal-close" id="bookmarks-modal-close">&times;</button>
      </div>
      <div class="bookmarks-modal-content" id="bookmarks-modal-content">
        <div class="bookmarks-modal-empty">No bookmarks yet.</div>
      </div>
      <div class="bookmarks-modal-footer">
        <span class="bookmarks-modal-count" id="bookmarks-modal-count">0 bookmarks</span>
      </div>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="content-area" id="content-area">
    <!-- Webview Container -->
    <div class="webview-container" id="webview-container"></div>

    <!-- Internal Pages Container (for bookmark manager tab, etc.) -->
    <div class="internal-page" id="bookmarks-page"></div>

    <!-- Monitor Panel -->
    <div class="monitor-panel" id="monitor-panel">
      <div class="monitor-tabs">
        <button class="monitor-tab active" data-panel="performance">Performance</button>
        <button class="monitor-tab" data-panel="network">Network</button>
        <button class="monitor-tab" data-panel="console">Console</button>
        <button class="monitor-tab" data-panel="security">Security</button>
        <button class="monitor-tab" data-panel="style">Style Audit</button>
      </div>

      <div class="monitor-toolbar">
        <button class="monitor-action-btn" id="monitor-clear" title="Clear current panel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          Clear
        </button>
        <button class="monitor-action-btn" id="monitor-run-audit" title="Run audits on current page">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          Run Audit
        </button>
        <div class="monitor-toolbar-separator"></div>
        <button class="monitor-action-btn" id="monitor-export-json" title="Export all monitoring data as JSON report">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Export JSON
        </button>
        <div class="monitor-toolbar-spacer"></div>
        <button class="monitor-action-btn monitor-close-btn" id="monitor-close" title="Close panel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>

      <div class="monitor-content" id="monitor-content">
        <!-- Performance Panel -->
        <div class="monitor-panel-content active" id="panel-performance">
          <div class="monitor-empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" opacity="0.3"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
            <p>Loading performance data...</p>
          </div>
        </div>

        <!-- Network Panel -->
        <div class="monitor-panel-content" id="panel-network">
          <div class="monitor-empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" opacity="0.3"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
            <p>Waiting for network requests...</p>
          </div>
        </div>

        <!-- Console Panel -->
        <div class="monitor-panel-content" id="panel-console">
          <div class="monitor-empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" opacity="0.3"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
            <p>No console messages yet...</p>
          </div>
        </div>

        <!-- Security Panel -->
        <div class="monitor-panel-content" id="panel-security">
          <div class="monitor-empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" opacity="0.3"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            <p>Run a security scan to check for vulnerabilities...</p>
          </div>
        </div>

        <!-- Style Audit Panel -->
        <div class="monitor-panel-content" id="panel-style">
          <div class="monitor-empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" opacity="0.3"><path d="M12 22C6.49 22 2 17.51 2 12S6.49 2 12 2s10 4.04 10 10c0 4.17-2.47 7.56-6 9.07V19c0-.55-.45-1-1-1h-1v-1c0-.55-.45-1-1-1h-2v-2c0-.55-.45-1-1-1H9v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            <p>Run a style audit to check for issues...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Splitter / Resizer -->
    <div class="panel-splitter" id="panel-splitter"></div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="status-bar">
    <span class="status-left" id="status-left">Ready</span>
    <span class="status-right" id="status-right">Inspector Browser v1.0</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
